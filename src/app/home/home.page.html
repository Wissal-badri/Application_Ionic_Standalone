<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>BADRI WISSAL</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

    <!-- Header Section -->
    <div class="home-hero">
      <div class="hero-icon">⬡</div>
      <h1 class="hero-title">Ionic Standalone</h1>
      <p class="hero-subtitle">Bienvenue dans votre application</p>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Navigation Card -->
    <div class="nav-card" (click)="goToCalculsPage()">
      <div class="nav-card-left">
        <span class="nav-icon">⊞</span>
        <div class="nav-info">
          <span class="nav-title">Calculatrice</span>
          <span class="nav-desc">Opérations arithmétiques</span>
        </div>
      </div>
      <span class="nav-arrow">›</span>
