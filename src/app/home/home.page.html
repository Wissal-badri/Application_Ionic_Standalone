<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>BADRI WISSAL</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div id="container">

    <!-- Header Section -->
    <div class="home-hero">
      <ion-icon class="hero-icon" name="analytics-outline"></ion-icon>
      <h1 class="hero-title">Ionic Standalone</h1>
      <p class="hero-subtitle">Bienvenue dans votre application</p>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Navigation Card -->
    <div class="nav-card" (click)="goToCalculsPage()">
      <div class="nav-card-left">
        <ion-icon class="nav-icon" name="calculator-outline"></ion-icon>
        <div class="nav-info">
          <span class="nav-title">Calculatrice</span>
          <span class="nav-desc">Opérations arithmétiques</span>
        </div>
      </div>
      <span class="nav-arrow">›</span>
    </div>

    <!-- Jeux Card -->
    <div class="nav-card" (click)="goToJeuxPage()">
      <div class="nav-card-left">
        <ion-icon class="nav-icon" name="game-controller-outline"></ion-icon>
        <div class="nav-info">
          <span class="nav-title">Jeux</span>
          <span class="nav-desc">Accéder aux jeux</span>
        </div>
      </div>
      <span class="nav-arrow">›</span>
    </div>

    <!-- Transfert Data Card -->
    <div class="nav-card" (click)="goToTransfertDataPage()">
      <div class="nav-card-left">
        <ion-icon class="nav-icon" name="swap-horizontal-outline"></ion-icon>
        <div class="nav-info">
          <span class="nav-title">Transfert Data</span>
          <span class="nav-desc">Transférer les données</span>
        </div>
      </div>
      <span class="nav-arrow">›</span>
    </div>

  </div>
</ion-content>
