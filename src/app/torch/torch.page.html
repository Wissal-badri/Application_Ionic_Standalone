<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Contrôle Torche</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="torch-container">
    <div class="hero-section">
      <h1>Lampe de Poche</h1>
      <p>Contrôlez le flash de votre appareil</p>
    </div>

    <!-- Bulb Visual -->
    <div class="bulb-visual" [class.on]="isTorchOn">
      <div class="glow"></div>
      <ion-icon name="bulb"></ion-icon>
    </div>

    <div class="status-badge" [class.on]="isTorchOn">
      {{ isTorchOn ? 'Flash Activé' : 'Flash Désactivé' }}
    </div>

    <!-- ON Card -->
    <div class="torch-card" (click)="turnOn()" [class.disabled]="isTorchOn">
      <div class="card-left">
        <ion-icon name="flash"></ion-icon>
        <div class="info">
          <span class="title">Allumer</span>
          <span class="desc">Activer la lampe torche</span>
        </div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- OFF Card -->
    <div class="torch-card" (click)="turnOff()" [class.disabled]="!isTorchOn">
      <div class="card-left">
        <ion-icon name="flash-off"></ion-icon>
        <div class="info">
          <span class="title">Éteindre</span>
          <span class="desc">Désactiver la lumière flash</span>
        </div>
      </div>
      <span class="arrow">›</span>
    </div>
    
    <div class="main-toggle">
       <ion-button (click)="toggle()" fill="clear">
          Basculer l'état
       </ion-button>
    </div>
  </div>
</ion-content>
