<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home"></ion-back-button>
    </ion-buttons>
    <ion-title>SMS & Téléphone</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="communication-container">
    
    <!-- SMS Manager Card -->
    <ion-card mode="ios" class="comm-card">
      <div class="card-glow"></div>
      <ion-card-header>
        <div class="icon-wrapper sms-glow">
          <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
        </div>
        <ion-card-title>SMS Manager</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p class="desc">Ouvrez l'application de messagerie native pour envoyer des SMS en toute simplicité.</p>
        <ion-button expand="block" shape="round" class="main-btn" (click)="openSMSManager()">
          <ion-icon name="paper-plane-outline" slot="start"></ion-icon>
          OUVRIR SMS MANAGER
        </ion-button>
      </ion-card-content>
    </ion-card>

    <!-- Phone Manager Card -->
    <ion-card mode="ios" class="comm-card">
      <div class="card-glow"></div>
      <ion-card-header>
        <div class="icon-wrapper phone-glow">
          <ion-icon name="call-outline"></ion-icon>
        </div>
        <ion-card-title>Téléphone Manager</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p class="desc">Accédez instantanément au clavier de numérotation de votre appareil.</p>
        <ion-button expand="block" shape="round" class="main-btn" (click)="openPhoneManager()">
          <ion-icon name="call-outline" slot="start"></ion-icon>
          OUVRIR TÉLÉPHONE
        </ion-button>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
