<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Capture Média</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="main-container">
    <div class="hero-section">
      <h1>Studio Photo & Vidéo</h1>
      <p>Prenez des captures instantanées</p>
    </div>

    <!-- Photo Card -->
    <div class="capture-btn-card" (click)="takePhoto()">
      <div class="card-left">
        <ion-icon name="camera"></ion-icon>
        <div class="info">
          <span class="title">Appareil Photo</span>
          <span class="desc">Capturer une image fixe</span>
        </div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- Video Card -->
    <div class="capture-btn-card" (click)="recordVideo()">
      <div class="card-left">
        <ion-icon name="videocam"></ion-icon>
        <div class="info">
          <span class="title">Enregistreur Vidéo</span>
          <span class="desc">Démarrer une séquence vidéo</span>
        </div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- Preview Section -->
    <div class="preview-section" *ngIf="photo">
      <span class="section-label">Aperçu Récent</span>
      <div class="glass-preview">
        <img [src]="photo" alt="Captured Photo" />
      </div>
    </div>
  </div>
</ion-content>
