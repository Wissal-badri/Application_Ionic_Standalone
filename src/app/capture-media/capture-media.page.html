<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>Capture Média</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="main-container">
    <div class="hero-section">
      <h1>Studio de Capture</h1>
      <p>Prenez des photos ou enregistrez des vidéos instantanément.</p>
    </div>

    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-card (click)="takePhoto()" class="capture-card photo-card">
            <ion-card-content>
              <div class="icon-circle">
                <ion-icon name="camera"></ion-icon>
              </div>
              <h3>PHOTO</h3>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size="6">
          <ion-card (click)="recordVideo()" class="capture-card video-card">
            <ion-card-content>
              <div class="icon-circle">
                <ion-icon name="videocam"></ion-icon>
              </div>
              <h3>VIDÉO</h3>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>

    <div class="preview-container" *ngIf="photo">
      <h2>Aperçu</h2>
      <div class="glass-preview">
        <img [src]="photo" alt="Captured Photo" />
      </div>
    </div>
  </div>
</ion-content>
