<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="back-btn" (click)="goHome()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Calculatrice</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div id="container">

    <!-- Result Display -->
    <div class="display-screen">
      <div class="display-expression">
        <span>{{ num1 !== undefined ? num1 : '—' }} {{ activeOp || '' }} {{ num2 !== undefined ? num2 : '' }}</span>
      </div>
      <div class="display-result">
        {{ resultat }}
      </div>
    </div>

    <!-- Number Inputs -->
    <div class="inputs-row">
      <div class="input-wrapper">
        <span class="input-icon">A</span>
        <ion-input type="number" placeholder="0" [(ngModel)]="num1" class="styled-input">
        </ion-input>
      </div>
      <div class="input-wrapper">
        <span class="input-icon">B</span>
        <ion-input type="number" placeholder="0" [(ngModel)]="num2" class="styled-input">
        </ion-input>
      </div>
    </div>

    <!-- Operation Buttons -->
    <div class="ops-grid">
      <button class="op-btn btn-add" (click)="calculer('+')">
        <span class="op-icon">＋</span>
        <span class="op-label">Additionner</span>
      </button>
      <button class="op-btn btn-sub" (click)="calculer('-')">
        <span class="op-icon">－</span>
        <span class="op-label">Soustraire</span>
      </button>
      <button class="op-btn btn-mul" (click)="calculer('*')">
        <span class="op-icon">✕</span>
        <span class="op-label">Multiplier</span>
      </button>
      <button class="op-btn btn-div" (click)="calculer('/')">
        <span class="op-icon">÷</span>
        <span class="op-label">Diviser</span>
      </button>
    </div>

    <!-- Clear Button -->
    <button class="clear-btn" (click)="effacer()">
      <ion-icon name="trash-outline"></ion-icon>
      Effacer
    </button>

  </div>
</ion-content>
