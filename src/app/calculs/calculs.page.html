<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>calculs</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">calculs</ion-title>
    </ion-toolbar>
  </ion-header>
  <div id="container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>
          <ion-label>Calculs Operatiosn</ion-label>
        </ion-card-title>
        <ion-card-subtitle>
          <ion-label>Calculs SDDI4</ion-label>
        </ion-card-subtitle>
        <ion-card-content>
          <ion-list>
            <ion-item class="inputs-container">
              <ion-input type="number" placeholder="NB 1" [(ngModel)]="num1"></ion-input>
              <ion-input type="number" placeholder="NB 2" [(ngModel)]="num2"></ion-input>
            </ion-item>
            <ion-item class="ops-container">
              <ion-button (click)="calculer('+')">+</ion-button>
              <ion-button (click)="calculer('-')">-</ion-button>
              <ion-button (click)="calculer('*')">*</ion-button>
              <ion-button (click)="calculer('/')">/</ion-button>
            </ion-item>
            <ion-item class="clear-container">
              <ion-button expand="block" (click)="effacer()" class="clear-btn">Effacer</ion-button>
            </ion-item>
            <ion-item class="result-container">
              <ion-label>{{ resultat }}</ion-label>
            </ion-item>
          </ion-list>
        </ion-card-content>
      </ion-card-header>
    </ion-card>
  </div>
</ion-content>
