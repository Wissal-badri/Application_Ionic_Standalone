<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="back-btn" (click)="goHome()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>UI Components</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div id="container">

    <!-- Header Section -->
    <div class="ui-hero">
      <ion-icon class="hero-icon" name="brush-outline"></ion-icon>
      <h1 class="hero-title">Composants UI</h1>
      <p class="hero-subtitle">Développement des interfaces utilisateur</p>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Cards Grid -->
    <div class="cards-grid">
      
      <!-- Card 1: Tennis Rackets - Local Image -->
      <div class="ui-card">
        <div class="card-image">
          <img src="assets/Images/Paddle_Girl.jpeg" alt="Tennis Rackets">
          <span class="local-badge">Image locale</span>
        </div>
        <div class="card-content">
          <h3 class="card-title">Tennis Rackets</h3>
          <p class="card-description">Équipements de tennis professionnels</p>
        </div>
      </div>

      <!-- Card 2: Network Image -->
      <div class="ui-card">
        <div class="card-image">
          <img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=500&h=500&fit=crop&q=80" alt="Sports Car">
          <span class="network-badge">Image Network</span>
        </div>
        <div class="card-content">
          <h3 class="card-title">Image Network</h3>
          <p class="card-description">Prise de l'internet random</p>
        </div>
      </div>

      <!-- Card 3: Video Sample -->
      <div class="ui-card">
        <div class="card-video">
          <video poster="https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217" controls style="width: 100%; border-radius: 8px;">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            <p>Votre navigateur ne supporte pas la vidéo HTML5.</p>
          </video>
          <span class="video-badge">Vidéo</span>
        </div>
        <div class="card-content">
          <h3 class="card-title">Vidéo Big Buck Bunny</h3>
          <p class="card-description">Film d'animation open-source</p>
        </div>
      </div>

      <!-- Card 4: Audio -->
      <div class="ui-card">
        <div class="card-audio">
          <div class="audio-player">
            <audio controls style="width: 100%;">
              <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
              <p>Votre navigateur ne supporte pas l'audio HTML5.</p>
            </audio>
          </div>
          <span class="audio-badge">Audio</span>
        </div>
        <div class="card-content">
          <h3 class="card-title">Audio</h3>
          <p class="card-description">Musique énergique disponible</p>
        </div>
      </div>

    </div>

  </div>
</ion-content>
